# Redis configuration for local development
# Optimized to minimize memory and I/O usage.
# Mounted into the container at /usr/local/etc/redis/redis.conf

# Memory cap — prevents Redis from growing unbounded
maxmemory 128mb
maxmemory-policy noeviction

# Disable persistence — dev data is ephemeral, saves disk I/O
save ""
appendonly no

# Bind to all interfaces so the container port is reachable from the host
bind 0.0.0.0

# Default port
port 6379

# Disable protected mode (not needed inside Docker network)
protected-mode no
