# PostgreSQL tuning for local development
# These values are passed via `command:` in docker-compose.local.yml
# to minimize memory usage on a dev machine.
#
# Parameter reference:
#   max_connections          = 50        # low cap — dev only needs a handful
#   shared_buffers           = 128MB     # 25% of RAM (default for 512MB total)
#   effective_cache_size     = 256MB     # estimate of OS page-cache available
#   work_mem                 = 4MB       # per sort/hash operation
#   maintenance_work_mem     = 32MB      # for VACUUM, CREATE INDEX, etc.
#   wal_buffers              = 8MB       # WAL I/O buffer
#   checkpoint_completion_target = 0.9  # spread checkpoint I/O
#   log_min_duration_statement = 2000   # log queries slower than 2s
#
# To apply: these flags are already set in the postgres `command:` block.
# If you want a mounted config file instead, uncomment and mount this file:
#   volumes:
#     - ./docker/database/postgres.conf:/etc/postgresql/postgresql.conf
#   command: postgres -c config_file=/etc/postgresql/postgresql.conf
