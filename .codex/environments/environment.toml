# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "twenty"

[setup]
script = ""

[[actions]]
name = "debug launch"
icon = "tool"
command = '''
set -euo pipefail

echo "1) Installing dependencies…"
yarn

echo "2) Resetting Twenty database…"
npx nx database:reset twenty-server

echo "3) Resetting Nx…"
npx nx reset

echo "4) Checking Redis…"
if redis-cli ping >/dev/null 2>&1; then
  echo "✅ Redis already running"
else
  echo "Redis not responding — starting via Homebrew services…"
  brew services start redis >/dev/null
  redis-cli ping >/dev/null 2>&1 && echo "✅ Redis started"
fi

TWENTY_SERVICE_PIDS=()

start_in_background() {
  echo "▶️  Starting: $*"
  "$@" &
  pid=$!
  TWENTY_SERVICE_PIDS+=("$pid")
  echo "   PID: $pid"
}

stop_all() {
  echo ""
  echo "🛑 Stopping Twenty processes…"
  if [ "${#TWENTY_SERVICE_PIDS[@]}" -gt 0 ]; then
    kill "${TWENTY_SERVICE_PIDS[@]}" 2>/dev/null || true
  fi
  echo "Done."
}

trap stop_all INT TERM EXIT

echo "5) Starting Twenty services (Ctrl+C to stop)…"
start_in_background npx nx start twenty-server
start_in_background npx nx worker twenty-server
start_in_background npx nx start twenty-front

echo ""
echo "✅ Running. Press Ctrl+C to stop."
wait
'''

[[actions]]
name = "Simple launch"
icon = "tool"
command = '''
brew services start redis
npx nx start
'''
