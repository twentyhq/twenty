name: tob-twenty

services:
  # ── Foundry Datasets DB (formerly "db") ──────────────────────────────
  # Contains only the foundry schema (~1 TB). Stays on port 5435.
  # Data remains at /mnt/main/pg_main — no move required.
  foundry-datasets-db:
    image: postgres:16
    container_name: foundry-datasets-db
    ports:
      - "127.0.0.1:5435:5432"
    environment:
      POSTGRES_PASSWORD: ${PG_DATABASE_PASSWORD}
      POSTGRES_USER: ${PG_DATABASE_USER}
      POSTGRES_DB: default
    volumes:
      - /mnt/main/pg_main:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_DATABASE_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  # ── Twenty CRM DB ───────────────────────────────────────────────────
  # Twenty CRM schemas (core, workspace_*) + listmonk DB. Port 5437.
  twenty-db:
    image: postgres:16
    container_name: twenty-db
    ports:
      - "127.0.0.1:5437:5432"
    environment:
      POSTGRES_PASSWORD: ${PG_DATABASE_PASSWORD}
      POSTGRES_USER: ${PG_DATABASE_USER}
      POSTGRES_DB: default
    volumes:
      - /mnt/main/pg_twenty:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_DATABASE_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    networks:
      - default
      - dagster_network
      - crm-stack

  redis:
    image: redis:7
    command: redis-server --maxmemory-policy noeviction
    volumes:
      - redis-data:/data
    restart: always

  twenty-server:
    image: ${IMAGE}:${TAG}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "3003:3000"
    volumes:
      - twenty-storage:/app/packages/twenty-server/.local-storage
    networks:
      - default
      - dagster_network
      - crm-stack
    environment:
      NODE_PORT: 3000
      SERVER_URL: ${SERVER_URL}
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER}:${PG_DATABASE_PASSWORD}@twenty-db:5432/default
      REDIS_URL: redis://redis:6379
      APP_SECRET: ${APP_SECRET}
      DISABLE_DB_MIGRATIONS: "false"
      DISABLE_CRON_JOBS_REGISTRATION: "false"
      SERVERLESS_TYPE: DISABLED
      IS_MULTIWORKSPACE_ENABLED: "false"
      STORAGE_TYPE: local
      EMAIL_DRIVER: ${EMAIL_DRIVER:-smtp}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER}
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
    depends_on:
      twenty-db:
        condition: service_healthy
    healthcheck:
      test: curl --fail http://localhost:3000/healthz
      interval: 5s
      timeout: 5s
      retries: 20
    restart: always

  setup-subscriptions:
    image: python:3.12-slim
    volumes:
      - ./add-subscription-fields.sh:/scripts/add-subscription-fields.sh
      - ./create-subscription-views.py:/scripts/create-subscription-views.py
    environment:
      TWENTY_API_URL: http://twenty-server:3000
      TWENTY_API_KEY: ${TWENTY_API_KEY}
    depends_on:
      twenty-server:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/bash
      - -c
      - |
        apt-get update -qq && apt-get install -y -qq curl jq > /dev/null 2>&1
        bash /scripts/add-subscription-fields.sh
        python3 /scripts/create-subscription-views.py

  twenty-worker:
    image: ${IMAGE}:${TAG}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    command: ["yarn", "worker:prod"]
    volumes:
      - twenty-storage:/app/packages/twenty-server/.local-storage
    environment:
      SERVER_URL: ${SERVER_URL}
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER}:${PG_DATABASE_PASSWORD}@twenty-db:5432/default
      REDIS_URL: redis://redis:6379
      APP_SECRET: ${APP_SECRET}
      DISABLE_DB_MIGRATIONS: "true"
      DISABLE_CRON_JOBS_REGISTRATION: "true"
      SERVERLESS_TYPE: DISABLED
      STORAGE_TYPE: local
      EMAIL_DRIVER: ${EMAIL_DRIVER:-smtp}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER}
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
    depends_on:
      twenty-server:
        condition: service_healthy
    restart: always

volumes:
  redis-data:
  twenty-storage:

networks:
  dagster_network:
    external: true
  crm-stack:
    external: true
