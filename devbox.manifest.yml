# Gate-0 manifest — twentyhq/twenty (web-stack template)
# Generated by repo inspection 2026-06-13 (shallow clone @ main).
# This is image-contract item #4 (docs/plans/r1-devbox-spec.md): how this repo
# builds, tests, runs, and proves things. The devbox bake consumes this file;
# the evidence gate and rehearsal runner read it at run time.

repo: twentyhq/twenty
stack: web            # template: web → proof surface = live preview URL
detected:
  monorepo: nx
  package_manager: yarn@4.13.0   # corepack enable && corepack prepare
  node: "^24.5.0"
  language: typescript
  server_framework: nestjs
  front_framework: react + vite

services:             # from packages/twenty-docker/docker-compose.dev.yml
  - name: db
    image: postgres:16
  - name: redis
    image: redis:7
  bring_up: docker compose -f packages/twenty-docker/docker-compose.dev.yml up -d

env_setup:
  - npx nx reset:env twenty-server     # cp .env.example .env
  - npx nx reset:env twenty-front

data:
  init: npx nx database:init twenty-server
  reset: npx nx database:reset twenty-server          # supports seed / no-seed options
  seed: npx nx command-no-deps twenty-server -- workspace:seed:dev   # deterministic dev seed
  note: >
    database:reset with seed is the deterministic-state lever the blast-radius
    baseline and load rehearsal depend on.

build:
  server: npx nx build twenty-server
  front: npx nx build twenty-front

run:
  all: yarn start     # concurrently: server + front, then worker after tcp:3000
  server_only: npx nx start twenty-server
  front_only: npx nx start twenty-front
  worker: npx nx worker twenty-server

proof_surface:
  kind: live_preview_url
  preview_url: http://localhost:3001        # vite dev server (verify at bake)
  api_url: http://localhost:3000
  healthcheck: http://localhost:3000/healthz
  screenshot_method: playwright (reuse packages/twenty-e2e-testing browser setup)

tests:
  unit_server: npx nx test twenty-server
  unit_front: npx nx test twenty-front
  integration: npx nx test:integration twenty-server   # resets db (NODE_ENV=test) then jest-integration
  e2e_setup: npx nx setup twenty-e2e-testing
  e2e: npx nx test twenty-e2e-testing                   # playwright — rehearsal-test anchor
  lint: npx nx lint twenty-server && npx nx lint twenty-front   # oxlint
  typecheck: npx nx typecheck twenty-server && npx nx typecheck twenty-front

evidence_gate:        # consumed by pm-harness/scripts/evidence_gate.sh
  code_globs: '\.(ts|tsx|js|jsx|sql)$'
  required_trailer: 'Evidence:'

bake_notes:
  - corepack enable; yarn install at bake time (cache the .yarn dir in the image)
  - run unit_server once at bake to satisfy contract item 3 (tests verified runnable)
  - Node 24 required — pin base image accordingly
  - front dev port confirmed 3001 (vite); VITE_HOST=0.0.0.0 required in containers
  - APP_SECRET env required when no .env rides in the image
  - "in-container test runs MUST cap workers (--maxWorkers=4): uncapped jest spawns
     cores-1 workers and the docker VM's OOM killer SIGKILLs them (seen 2026-06-13)"
  - "devbox boot = server+front only via ordered entrypoint; the queue-worker races the
     server watch-compile over dist/ under container timing and kill-others takes all down"
  - "agent/test workloads: fresh `docker run --rm` instances only — never exec into the
     PM's live container (dist/ race with watch compiler)"
