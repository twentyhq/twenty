name: 'Test: Ota contract matrix'

on:
  workflow_dispatch:
    inputs:
      ota_repository:
        description: Ota source repository to build for this matrix run
        required: false
        default: ota-run/ota
      ota_ref:
        description: Ota branch, tag, or commit to build for this matrix run
        required: false
        default: 922056507ebcc19963edba58ee24b0246ecfdf25
  pull_request:
    paths:
      - 'ota.yaml'
      - '.github/workflows/test-ota-contract-matrix.yml'
  push:
    paths:
      - 'ota.yaml'
      - '.github/workflows/test-ota-contract-matrix.yml'

concurrency:
  group: ota-contract-matrix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  OTA_NO_UPDATE_CHECK: '1'

jobs:
  native:
    name: Ota Contract Matrix (Native - ${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-bash
            os: ubuntu-latest
            docker_ready: true
            full_proof: true
            unsupported_host: false
          - name: macos-bash
            os: macos-latest
            docker_ready: false
            full_proof: false
            unsupported_host: false
          - name: windows-bash
            os: windows-latest
            docker_ready: false
            full_proof: false
            unsupported_host: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24.5.0

      - name: Enable Yarn via corepack
        if: ${{ !matrix.unsupported_host }}
        shell: bash
        run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate
          node --version
          yarn --version

      - name: Install ota from source
        uses: ota-run/ota/.github/actions/install-ota-from-source@922056507ebcc19963edba58ee24b0246ecfdf25
        with:
          repository: ${{ github.event.inputs.ota_repository || 'ota-run/ota' }}
          ref: ${{ github.event.inputs.ota_ref || '922056507ebcc19963edba58ee24b0246ecfdf25' }}

      - name: Validate contract
        shell: bash
        run: |
          ota validate --json . > ota-validate.json
          ota validate .

      - name: List verify workflow tasks
        shell: bash
        run: ota tasks --workflow verify .

      - name: List native-dev workflow tasks
        shell: bash
        run: ota tasks --workflow native-dev .

      - name: List integration workflow tasks
        shell: bash
        run: ota tasks --workflow integration .

      - name: List docker-selfhost workflow tasks
        shell: bash
        run: ota tasks --workflow docker-selfhost .

      - name: Export execution topology
        shell: bash
        run: |
          ota execution topology --json . > ota-execution-topology.json
          cat ota-execution-topology.json

      - name: Doctor native-dev workflow + annotations
        id: doctor_native_dev
        if: ${{ matrix.unsupported_host }}
        timeout-minutes: 10
        shell: bash
        run: |
          set +e
          ota doctor --workflow native-dev --json . > ota-doctor-native-dev.json
          doctor_status=$?
          set -e
          ota annotations --mode doctor --format plain --input ota-doctor-native-dev.json
          echo "status=$doctor_status" >> "$GITHUB_OUTPUT"

      - name: Assert unsupported native host diagnosis
        if: ${{ matrix.unsupported_host }}
        shell: bash
        run: |
          if [ "${{ steps.doctor_native_dev.outputs.status }}" = "0" ]; then
            echo "expected ota doctor to fail on unsupported native Windows host"
            exit 1
          fi
          node - <<'JS'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('ota-doctor-native-dev.json', 'utf8'));
          const findings = report.findings || [];
          if (!findings.some((finding) => (finding.summary || '').startsWith('Unsupported host platform for context:'))) {
            console.error(JSON.stringify(findings, null, 2));
            process.exit(1);
          }
          JS

      - name: Dry-run native-dev workflow reports unsupported host
        if: ${{ matrix.unsupported_host }}
        shell: bash
        run: |
          set +e
          ota up --workflow native-dev --native --dry-run . > ota-up-native-dev.txt 2>&1
          status=$?
          set -e
          cat ota-up-native-dev.txt
          if [ "$status" -eq 0 ]; then
            echo "expected ota up --dry-run to fail on unsupported native Windows host"
            exit 1
          fi
          grep -F "Unsupported host platform for context" ota-up-native-dev.txt

      - name: Dry-run docker-selfhost workflow reports unsupported host
        if: ${{ matrix.unsupported_host }}
        shell: bash
        run: |
          set +e
          ota up --workflow docker-selfhost --native --dry-run . > ota-up-docker-selfhost.txt 2>&1
          status=$?
          set -e
          cat ota-up-docker-selfhost.txt
          if [ "$status" -eq 0 ]; then
            echo "expected ota up --dry-run to fail on unsupported native Windows host"
            exit 1
          fi
          grep -F "Unsupported host platform for context" ota-up-docker-selfhost.txt

      - name: Dry-run verify workflow
        if: ${{ !matrix.unsupported_host }}
        shell: bash
        run: ota up --workflow verify --native --dry-run .

      - name: Dry-run native-dev workflow
        if: ${{ !matrix.unsupported_host }}
        shell: bash
        run: ota up --workflow native-dev --native --dry-run .

      - name: Dry-run integration workflow
        if: ${{ !matrix.unsupported_host }}
        shell: bash
        run: ota up --workflow integration --native --dry-run .

      - name: Dry-run docker-selfhost workflow
        if: ${{ matrix.docker_ready }}
        shell: bash
        run: ota up --workflow docker-selfhost --native --dry-run .

      - name: Proof docker-selfhost workflow
        if: ${{ matrix.full_proof }}
        timeout-minutes: 90
        shell: bash
        run: |
          ota clean . || true
          set +e
          ota proof runtime --workflow docker-selfhost --json . > ota-proof-docker-selfhost.json
          status=$?
          cat ota-proof-docker-selfhost.json
          if [ "$status" -eq 0 ]; then
            docker compose -f packages/twenty-docker/docker-compose.yml down -v || true
            ota clean . || true
          fi
          exit "$status"

      - name: Upload failure artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: ota-contract-matrix-${{ matrix.name }}
          include-hidden-files: true
          path: |
            ota-validate.json
            ota-execution-topology.json
            ota-doctor-native-dev.json
            ota-up-native-dev.txt
            ota-up-docker-selfhost.txt
            ota-proof-docker-selfhost.json
            .ota/proof/docker-selfhost/
