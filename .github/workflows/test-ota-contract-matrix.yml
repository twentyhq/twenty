name: 'Test: Ota contract matrix'

on:
  workflow_dispatch:
    inputs:
      ota_repository:
        description: Ota source repository to build for this matrix run
        required: false
        default: ota-run/ota
      ota_ref:
        description: Ota branch, tag, or commit to build for this matrix run
        required: false
        default: v1.6.19
  pull_request:
    paths:
      - 'ota.yaml'
      - '.github/workflows/test-ota-contract-matrix.yml'
  push:
    paths:
      - 'ota.yaml'
      - '.github/workflows/test-ota-contract-matrix.yml'

concurrency:
  group: ota-contract-matrix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  OTA_NO_UPDATE_CHECK: '1'

jobs:
  native:
    name: Ota Contract Matrix (Cross-OS + Ubuntu Runtime - ${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-bash
            os: ubuntu-latest
            docker_ready: true
            full_proof: true
            unsupported_host: false
          - name: macos-bash
            os: macos-latest
            docker_ready: false
            full_proof: false
            unsupported_host: false
          - name: windows-bash
            os: windows-latest
            docker_ready: false
            full_proof: false
            unsupported_host: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24.5.0

      - name: Enable Yarn via corepack
        if: ${{ !matrix.unsupported_host }}
        shell: bash
        run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate
          node --version
          yarn --version

      - name: Install ota from source
        uses: ota-run/ota/.github/actions/install-ota-from-source@v1.6.19
        with:
          repository: ${{ github.event.inputs.ota_repository || 'ota-run/ota' }}
          ref: ${{ github.event.inputs.ota_ref || 'v1.6.19' }}

      - name: Assert ota minimum version from contract
        shell: bash
        run: |
          ota --version | tee ota-version.txt
          required="$(awk -F'"' '/minimum_version:/{print $2; exit}' ota.yaml)"
          if [ -z "$required" ]; then
            echo "missing metadata.ota.minimum_version in ota.yaml"
            exit 1
          fi
          node - "$required" "$(cat ota-version.txt)" <<'JS'
          const required = process.argv[2];
          const versionLine = process.argv[3];
          const match = versionLine.match(/v(\d+\.\d+\.\d+)/);
          if (!match) {
            console.error(`unable to parse ota version from: ${versionLine}`);
            process.exit(1);
          }
          const current = match[1];
          const toParts = (v) => v.split('.').map((x) => Number.parseInt(x, 10));
          const compare = (a, b) => {
            const ap = toParts(a);
            const bp = toParts(b);
            for (let i = 0; i < 3; i += 1) {
              const diff = (ap[i] || 0) - (bp[i] || 0);
              if (diff !== 0) return diff;
            }
            return 0;
          };
          if (compare(current, required) < 0) {
            console.error(`installed ota ${current} does not satisfy minimum_version ${required}`);
            process.exit(1);
          }
          JS

      - name: Validate contract
        shell: bash
        run: |
          ota validate --json . > ota-validate.json
          ota validate .

      - name: Export workflow task matrices (JSON)
        shell: bash
        run: |
          ota tasks --workflow verify --json . > ota-tasks-verify.json
          ota tasks --workflow native-dev --json . > ota-tasks-native-dev.json
          ota tasks --workflow integration --json . > ota-tasks-integration.json
          ota tasks --workflow docker-selfhost --json . > ota-tasks-docker-selfhost.json

      - name: Export execution topology
        shell: bash
        run: |
          ota execution topology --json . > ota-execution-topology.json
          cat ota-execution-topology.json

      - name: Doctor native-dev workflow + annotations
        id: doctor_native_dev
        if: ${{ matrix.unsupported_host }}
        timeout-minutes: 10
        shell: bash
        run: |
          set +e
          ota doctor --workflow native-dev --json . > ota-doctor-native-dev.json
          doctor_status=$?
          set -e
          ota annotations --mode doctor --format plain --input ota-doctor-native-dev.json
          echo "status=$doctor_status" >> "$GITHUB_OUTPUT"

      - name: Assert unsupported native host diagnosis
        if: ${{ matrix.unsupported_host }}
        shell: bash
        run: |
          if [ "${{ steps.doctor_native_dev.outputs.status }}" = "0" ]; then
            echo "expected ota doctor to fail on unsupported native Windows host"
            exit 1
          fi
          node - <<'JS'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('ota-doctor-native-dev.json', 'utf8'));
          const findings = report.findings || [];
          if (!findings.some((finding) => (finding.summary || '').startsWith('Unsupported host platform for context:'))) {
            console.error(JSON.stringify(findings, null, 2));
            process.exit(1);
          }
          JS

      - name: Dry-run native-dev workflow reports unsupported host
        if: ${{ matrix.unsupported_host }}
        shell: bash
        run: |
          set +e
          ota up --workflow native-dev --native --dry-run --json . > ota-up-native-dev.json
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "expected ota up --dry-run to fail on unsupported native Windows host"
            exit 1
          fi
          node - <<'JS'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('ota-up-native-dev.json', 'utf8'));
          const blockers = report.blockers || [];
          if (report.status !== 'BLOCKED') {
            console.error(JSON.stringify(report, null, 2));
            process.exit(1);
          }
          if (!blockers.some((blocker) => (blocker.summary || '').startsWith('Unsupported host platform for context:'))) {
            console.error(JSON.stringify(blockers, null, 2));
            process.exit(1);
          }
          JS

      - name: Dry-run docker-selfhost workflow reports unsupported host
        if: ${{ matrix.unsupported_host }}
        shell: bash
        run: |
          set +e
          ota up --workflow docker-selfhost --native --dry-run --json . > ota-up-docker-selfhost.json
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "expected ota up --dry-run to fail on unsupported native Windows host"
            exit 1
          fi
          node - <<'JS'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('ota-up-docker-selfhost.json', 'utf8'));
          const blockers = report.blockers || [];
          if (report.status !== 'BLOCKED') {
            console.error(JSON.stringify(report, null, 2));
            process.exit(1);
          }
          if (!blockers.some((blocker) => (blocker.summary || '').startsWith('Unsupported host platform for context:'))) {
            console.error(JSON.stringify(blockers, null, 2));
            process.exit(1);
          }
          JS

      - name: Dry-run verify workflow
        if: ${{ !matrix.unsupported_host }}
        shell: bash
        run: |
          ota up --workflow verify --native --dry-run --json . > ota-up-verify.json
          node - <<'JS'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('ota-up-verify.json', 'utf8'));
          if (!report.dry_run || report.status === 'BLOCKED') {
            console.error(JSON.stringify(report, null, 2));
            process.exit(1);
          }
          JS

      - name: Dry-run verify workflow (container mode)
        shell: bash
        run: |
          set +e
          ota up --workflow verify --container --dry-run --json . > ota-up-verify-container.json
          container_status=$?
          set -e
          node - <<'JS'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('ota-up-verify-container.json', 'utf8'));
          if (!report.dry_run || !report.status) {
            console.error(JSON.stringify(report, null, 2));
            process.exit(1);
          }
          JS
          if [ "$container_status" -ne 0 ]; then
            echo "container dry-run blocked on this host (expected on non-Ubuntu hosted runners)"
          fi

      - name: Dry-run native-dev workflow
        if: ${{ !matrix.unsupported_host }}
        shell: bash
        run: |
          ota up --workflow native-dev --native --dry-run --json . > ota-up-native-dev.json
          node - <<'JS'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('ota-up-native-dev.json', 'utf8'));
          if (!report.dry_run || report.status === 'BLOCKED') {
            console.error(JSON.stringify(report, null, 2));
            process.exit(1);
          }
          JS

      - name: Dry-run integration workflow
        if: ${{ !matrix.unsupported_host }}
        shell: bash
        run: |
          ota up --workflow integration --native --dry-run --json . > ota-up-integration.json
          node - <<'JS'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('ota-up-integration.json', 'utf8'));
          if (!report.dry_run || report.status === 'BLOCKED') {
            console.error(JSON.stringify(report, null, 2));
            process.exit(1);
          }
          JS

      - name: Dry-run docker-selfhost workflow
        if: ${{ matrix.docker_ready }}
        shell: bash
        run: |
          ota up --workflow docker-selfhost --native --dry-run --json . > ota-up-docker-selfhost.json
          node - <<'JS'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('ota-up-docker-selfhost.json', 'utf8'));
          if (!report.dry_run || report.status === 'BLOCKED') {
            console.error(JSON.stringify(report, null, 2));
            process.exit(1);
          }
          JS

      - name: Execute native smoke tasks (cross-OS non-Ubuntu)
        if: ${{ !matrix.full_proof && !matrix.unsupported_host }}
        timeout-minutes: 45
        shell: bash
        run: |
          ota run verify --native --stream .

      - name: Execute verify workflow (native)
        if: ${{ matrix.full_proof }}
        timeout-minutes: 45
        shell: bash
        run: ota up --workflow verify --native --stream .

      - name: Execute verify workflow (container)
        if: ${{ matrix.full_proof }}
        timeout-minutes: 45
        shell: bash
        run: ota up --workflow verify --container --stream .

      - name: Dry-run all non-internal tasks (native coverage lane)
        if: ${{ matrix.full_proof }}
        timeout-minutes: 120
        shell: bash
        run: |
          set -euo pipefail
          ota tasks --json . > ota-tasks-all.json
          jq -c '
            .tasks[]
            | select((.internal // false) == false)
            | {
                name: .name,
                supports_native: (
                  if (.modes | type) == "array" then
                    any(.modes[]?; .mode == "native")
                  else
                    ((.default_mode // "native") == "native")
                  end
                ),
                runtime_native: (
                  if (.modes | type) == "array" then
                    any(.modes[]?; .mode == "native" and ((.has_runtime // false) == true))
                  else
                    (.has_runtime // false)
                  end
                )
              }
            | select(.supports_native)
          ' ota-tasks-all.json > ota-non-internal-native.jsonl
          while IFS= read -r task_line; do
            task_name="$(jq -r '.name' <<<"$task_line")"
            runtime_native="$(jq -r '.runtime_native' <<<"$task_line")"
            echo ">>> [native] ${task_name} (runtime=${runtime_native})"
            if [ "$runtime_native" = "true" ]; then
              ota run --native --dry-run --json "$task_name" .
            else
              ota run --native --dry-run --json "$task_name" .
            fi
          done < ota-non-internal-native.jsonl

      - name: Dry-run all non-internal tasks (container coverage lane)
        if: ${{ matrix.full_proof }}
        timeout-minutes: 120
        shell: bash
        run: |
          set -euo pipefail
          ota tasks --json . > ota-tasks-all.json
          jq -c '
            .tasks[]
            | select((.internal // false) == false)
            | {
                name: .name,
                supports_container: (
                  if (.modes | type) == "array" then
                    any(.modes[]?; .mode == "container")
                  else
                    ((.default_mode // "native") == "container")
                  end
                ),
                runtime_container: (
                  if (.modes | type) == "array" then
                    any(.modes[]?; .mode == "container" and ((.has_runtime // false) == true))
                  else
                    (.has_runtime // false)
                  end
                )
              }
            | select(.supports_container)
          ' ota-tasks-all.json > ota-non-internal-container.jsonl
          while IFS= read -r task_line; do
            task_name="$(jq -r '.name' <<<"$task_line")"
            runtime_container="$(jq -r '.runtime_container' <<<"$task_line")"
            echo ">>> [container] ${task_name} (runtime=${runtime_container})"
            if [ "$runtime_container" = "true" ]; then
              ota run --container --dry-run --json "$task_name" .
            else
              ota run --container --dry-run --json "$task_name" .
            fi
          done < ota-non-internal-container.jsonl

      - name: Proof docker-selfhost workflow
        if: ${{ matrix.full_proof }}
        timeout-minutes: 90
        continue-on-error: true
        shell: bash
        run: |
          ota clean . || true
          set +e
          ota proof runtime --workflow docker-selfhost --json . > ota-proof-docker-selfhost.json
          status=$?
          cat ota-proof-docker-selfhost.json
          if [ "$status" -ne 0 ] && [ "$status" -ne 143 ]; then
            exit "$status"
          fi

      - name: Cleanup proof runtime state
        if: ${{ always() && matrix.full_proof }}
        shell: bash
        run: |
          docker compose -f packages/twenty-docker/docker-compose.yml down -v || true
          ota clean . || true

      - name: Upload matrix artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ota-contract-matrix-${{ matrix.name }}
          include-hidden-files: true
          path: |
            ota-version.txt
            ota-validate.json
            ota-tasks-verify.json
            ota-tasks-native-dev.json
            ota-tasks-integration.json
            ota-tasks-docker-selfhost.json
            ota-execution-topology.json
            ota-doctor-native-dev.json
            ota-up-verify.json
            ota-up-verify-container.json
            ota-up-native-dev.json
            ota-up-integration.json
            ota-up-docker-selfhost.json
            ota-proof-docker-selfhost.json
            .ota/proof/docker-selfhost/
