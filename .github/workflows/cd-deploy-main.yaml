name: CD deploy main

permissions:
  contents: read

on:
  push:
    branches:
      - main

jobs:
  deploy-main:
    timeout-minutes: 3
    runs-on: ubuntu-latest
    steps:
      - name: Mint twenty-infra dispatch token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.CI_BOT_PUBLIC_APP_ID }}
          private-key: ${{ secrets.CI_BOT_PUBLIC_APP_PRIVATE_KEY }}
          owner: twentyhq
          repositories: twenty-infra
          permission-actions: write

      - name: Trigger twenty-infra deploys
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh workflow run dev-cd.yaml --repo twentyhq/twenty-infra --ref main
          gh workflow run deploy-website.yaml --repo twentyhq/twenty-infra --ref main
