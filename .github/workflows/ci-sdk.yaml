name: CI SDK

on:
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changed-files-check:
    if: github.event_name != 'merge_group'
    uses: ./.github/workflows/changed-files.yaml
    with:
      files: |
        packages/twenty-sdk/**
        packages/twenty-server/**
        .github/workflows/ci-sdk.yaml
        !packages/twenty-sdk/package.json
  sdk-test:
    needs: changed-files-check
    if: needs.changed-files-check.outputs.any_changed == 'true'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: [lint, typecheck, test:unit, test:integration]
    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.11.0
        with:
          access_token: ${{ github.token }}
      - name: Fetch custom Github Actions and base branch history
        uses: actions/checkout@v4
        with:
          fetch-depth: 10
      - name: Install dependencies
        uses: ./.github/actions/yarn-install
      - name: Build
        run: npx nx build twenty-sdk
      - name: Run ${{ matrix.task }} task
        uses: ./.github/actions/nx-affected
        with:
          tag: scope:sdk
          tasks: ${{ matrix.task }}
  sdk-e2e-test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: [changed-files-check, sdk-test]
    if: needs.changed-files-check.outputs.any_changed == 'true'
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis
        ports:
          - 6379:6379
    env:
      APP_SECRET: twenty-app-dev-secret-not-for-production
      TWENTY_API_URL: http://localhost:3000
      TWENTY_API_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIyMDIwMjAyMC0xYzI1LTRkMDItYmYyNS02YWVjY2Y3ZWE0MTkiLCJ0eXBlIjoiQVBJX0tFWSIsIndvcmtzcGFjZUlkIjoiMjAyMDIwMjAtMWMyNS00ZDAyLWJmMjUtNmFlY2NmN2VhNDE5IiwiaWF0IjoxNzM1Njg5NjAwLCJleHAiOjQ4OTE0NDk2MDAsImp0aSI6IjIwMjAyMDIwLWY0MDEtNGQ4YS1hNzMxLTY0ZDAwN2MyN2JhZCJ9.bfQjfyN0NEtTCLE_xPyNcwonDzlSXFoP8kdCQTdnuDc
    steps:
      - name: Fetch custom Github Actions and base branch history
        uses: actions/checkout@v4
        with:
          fetch-depth: 10
      - name: Install dependencies
        uses: ./.github/actions/yarn-install
      - name: Build SDK and Server
        run: npx nx build twenty-sdk && npx nx build twenty-server
      - name: Setup server environment
        run: |
          cp packages/twenty-server/.env.example packages/twenty-server/.env
          echo "APP_SECRET=twenty-app-dev-secret-not-for-production" >> packages/twenty-server/.env
          echo "PG_DATABASE_URL=postgres://postgres:postgres@localhost:5432/default" >> packages/twenty-server/.env
          echo "REDIS_URL=redis://localhost:6379" >> packages/twenty-server/.env
          echo "SIGN_IN_PREFILLED=true" >> packages/twenty-server/.env
      - name: Create databases
        run: |
          PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d postgres -c 'CREATE DATABASE "default";'
          PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d postgres -c 'CREATE DATABASE "test";'
      - name: Setup database
        run: npx nx run twenty-server:database:reset
      - name: Start server
        run: nohup npx nx start:ci twenty-server > /tmp/twenty-server.log 2>&1 &
      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3000/healthz --timeout 120000 --interval 1000
      - name: Verify token works
        run: |
          echo "=== Testing token against /metadata ==="
          HTTP_CODE=$(curl -s -o /tmp/token-test.json -w "%{http_code}" \
            -X POST http://localhost:3000/metadata \
            -H "Authorization: Bearer $TWENTY_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ currentWorkspace { id } }"}')
          echo "HTTP Status: $HTTP_CODE"
          cat /tmp/token-test.json
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Token test returned non-200 status"
          fi
      - name: SDK / Run e2e Tests
        run: NODE_ENV=test npx vitest run --config ./vitest.e2e.config.ts
        working-directory: packages/twenty-sdk
      - name: Server / Dump logs on failure
        if: failure()
        run: |
          echo "=== twenty-server logs (last 100 lines) ==="
          tail -100 /tmp/twenty-server.log || echo "No server log file found"
          echo ""
          echo "=== Token test result ==="
          cat /tmp/token-test.json 2>/dev/null || echo "No token test result"
  ci-sdk-status-check:
    if: always() && !cancelled()
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: [changed-files-check, sdk-test, sdk-e2e-test]
    steps:
      - name: Fail job if any needs failed
        if: contains(needs.*.result, 'failure')
        run: exit 1
