name: Auto-Draft External PRs

on:
  pull_request_target:
    types: [opened]

jobs:
  convert-to-draft:
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.author_association != 'MEMBER' &&
      github.event.pull_request.author_association != 'OWNER' &&
      github.event.pull_request.author_association != 'COLLABORATOR'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Convert to draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api graphql -f query='
            mutation {
              convertPullRequestToDraft(input: {pullRequestId: "${{ github.event.pull_request.node_id }}"}) {
                pullRequest { isDraft }
              }
            }
          '

      - name: Welcome comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "👋 Thanks for contributing to Twenty!

          Your PR has been set to draft while you work on it. Once you're done, mark it as **Ready for review** and our automated checks will run.

          Looking forward to your contribution!"
