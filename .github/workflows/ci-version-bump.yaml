name: "Version: bump"

on:
  workflow_dispatch:
    inputs:
      version:
        required: false
        description: New current version (defaults to TWENTY_NEXT_VERSIONS[0], e.g. 2.4.0)
      ref:
        default: main
        description: Ref to start from (e.g. main, sha)

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  bump:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Bump version constants
        env:
          RAW_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$RAW_VERSION" ]; then
            VERSION="${RAW_VERSION#v}"
            npx nx version:bump twenty-server -- "$VERSION"
          else
            npx nx version:bump twenty-server
          fi

      - name: Get new version
        id: get_version
        run: |
          VERSION=$(sed -n "s/.*TWENTY_CURRENT_VERSION = '\([0-9.]*\)'.*/\1/p" packages/twenty-server/src/engine/core-modules/upgrade/constants/twenty-current-version.constant.ts)
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create PR with gh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          git config user.name "Github Action Deploy"
          git config user.email "github-action-deploy@twenty.com"

          BRANCH="version-bump/${VERSION}"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: bump version to ${VERSION}"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "chore: bump version to ${VERSION}" \
            --body "$(cat <<'EOF'
          ## Summary

          - Moves current version to previous versions array
          - Sets TWENTY_CURRENT_VERSION to the new version
          - Updates TWENTY_NEXT_VERSIONS with the next minor version

          ## Checklist

          - [ ] Verify version constants are correct
          EOF
          )" \
            --label "ci:allow-previous-version-upgrade-mutation"
