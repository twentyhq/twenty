name: PR Review Dispatch

on:
  pull_request_target:
    types: [ready_for_review, synchronize]

permissions: {}

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dispatch:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Mint ci-privileged dispatch token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.CI_BOT_PUBLIC_CLIENT_ID }}
          private-key: ${{ secrets.CI_BOT_PUBLIC_APP_PRIVATE_KEY }}
          owner: twentyhq
          repositories: ci-privileged
          permission-actions: write

      - name: Dispatch to ci-privileged
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh workflow run pr-review.yaml --repo twentyhq/ci-privileged --ref main \
            -f pr_number="$PR_NUMBER"
