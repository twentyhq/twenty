name: CI XOPure App Factory

on:
  pull_request:
    paths:
      - 'packages/twenty-apps/internal/xopure-crm/src/app-factory/**'
      - 'packages/twenty-apps/internal/xopure-crm/src/logic-functions/xopure-app-factory-orchestrator.ts'
      - '.github/actions/xopure-app-factory/**'
      - '.github/workflows/ci-xopure-app-factory.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-and-dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
      uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: yarn
          cache-dependency-path: 'yarn.lock'

      - name: Install
        run: yarn install --immutable

      - name: Run app-factory unit tests
        run: |
          yarn --cwd packages/twenty-apps/internal/xopure-crm vitest run -c vitest.unit.config.ts \
            src/app-factory/core/spec-validation.spec.ts \
            src/app-factory/cli/orchestrator-cli.spec.ts

      - name: Run orchestrator dry-run via composite action
        uses: ./.github/actions/xopure-app-factory
        with:
          spec-path: packages/twenty-apps/internal/xopure-crm/src/app-factory/examples/minimal-spec.json
