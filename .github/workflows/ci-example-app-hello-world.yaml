name: CI Example App Hello World

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changed-files-check:
    uses: ./.github/workflows/changed-files.yaml
    with:
      files: |
        packages/twenty-apps/examples/hello-world/**
        packages/twenty-sdk/**
        packages/twenty-client-sdk/**
        packages/twenty-shared/**
        !packages/twenty-sdk/package.json
        !packages/twenty-client-sdk/package.json
        !packages/twenty-shared/package.json

  example-app-hello-world:
    needs: changed-files-check
    if: needs.changed-files-check.outputs.any_changed == 'true'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis
        ports:
          - 6379:6379
    env:
      TWENTY_API_URL: http://localhost:3000
      TWENTY_API_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..HMGqCsVlOAPVUBhKSGlD1X86VoHKt4LIUtET3CGIdik
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/yarn-install

      - name: Build SDK packages
        run: npx nx build twenty-sdk

      - name: Setup server environment
        run: npx nx reset:env:e2e-testing-server twenty-server

      - name: Create databases
        run: |
          PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d postgres -c 'CREATE DATABASE "default";'
          PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d postgres -c 'CREATE DATABASE "test";'

      - name: Setup database
        run: npx nx run twenty-server:database:reset

      - name: Start server
        run: nohup npx nx start:ci twenty-server &

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3000/healthz --timeout 120000 --interval 1000

      - name: Run integration tests
        working-directory: packages/twenty-apps/examples/hello-world
        run: npx vitest run

  ci-example-app-hello-world-status-check:
    if: always() && !cancelled()
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: [changed-files-check, example-app-hello-world]
    steps:
      - name: Fail job if any needs failed
        if: contains(needs.*.result, 'failure')
        run: exit 1
