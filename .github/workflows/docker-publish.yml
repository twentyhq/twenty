name: Build and Push to GHCR

on:
  push:
    branches: [main]
    paths-ignore:
      - 'deploy/**'
      - '**.md'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Extract APP_VERSION from upgrade command
        id: app_version
        run: |
          VERSION=$(grep -E "'[0-9]+\.[0-9]+\.[0-9]+': commands_" \
            packages/twenty-server/src/database/commands/upgrade-version-command/upgrade.command.ts \
            | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" \
            | sort -t. -k1,1n -k2,2n -k3,3n | tail -1)
          echo "Detected APP_VERSION: ${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/twenty-docker/twenty/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            REACT_APP_SERVER_BASE_URL=https://crm.tob.sh
            APP_VERSION=${{ steps.app_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
