name: CD deploy tag

permissions:
  contents: read

on:
  push:
    tags:
      - 'twenty/v*'

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  dispatch-tag:
    timeout-minutes: 3
    runs-on: ubuntu-latest
    steps:
      - name: Mint twenty-infra dispatch token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.CI_BOT_PUBLIC_APP_ID }}
          private-key: ${{ secrets.CI_BOT_PUBLIC_APP_PRIVATE_KEY }}
          owner: twentyhq
          repositories: twenty-infra
          permission-actions: write

      - name: Trigger staging CD
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          gh workflow run staging-ci.yaml --repo twentyhq/twenty-infra --ref main -f tag="$REF_NAME"
