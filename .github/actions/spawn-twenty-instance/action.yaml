name: Spawn Twenty Instance
description: >
  Starts a full Twenty instance (server, worker, database, redis) using Docker
  Compose. The server is available at http://localhost:3000 for subsequent steps
  in the caller's job.
  Provide either 'twenty-version' (Docker Hub tag) or 'twenty-ref' (git branch/tag
  to build from source). If neither is provided, defaults to 'latest' from Docker Hub.
  Designed to be consumed from external repositories (e.g., twenty-app).

inputs:
  twenty-version:
    description: 'Twenty Docker Hub image tag (e.g., latest, v0.40.0). Mutually exclusive with twenty-ref.'
    required: false
    default: ''
  twenty-ref:
    description: 'Git branch, tag, or SHA to build from source. Mutually exclusive with twenty-version.'
    required: false
    default: ''
  twenty-repository:
    description: 'Twenty repository to checkout from (e.g., twentyhq/twenty or your-org/twenty-fork).'
    required: false
    default: 'twentyhq/twenty'
  github-token:
    description: 'GitHub token for cross-repo checkout. Required when calling from an external repository.'
    required: false
    default: ${{ github.token }}

outputs:
  server-url:
    description: 'URL where the Twenty server can be reached'
    value: ${{ steps.server-ready.outputs.server-url }}
  access-token:
    description: 'Admin access token for the Twenty instance'
    value: ${{ steps.admin-token.outputs.access-token }}

runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        VERSION="${{ inputs.twenty-version }}"
        REF="${{ inputs.twenty-ref }}"

        if [ -n "$VERSION" ] && [ -n "$REF" ]; then
          echo "::error::Cannot provide both 'twenty-version' and 'twenty-ref'. Pick one."
          exit 1
        fi

        if [ -n "$REF" ]; then
          echo "TWENTY_COMPOSE_CMD=docker compose -f docker-compose.yml -f docker-compose.build.yml" >> "$GITHUB_ENV"
          echo "Will build Twenty from ref: $REF on ${{ inputs.twenty-repository }}"
        else
          TAG="${VERSION:-latest}"
          echo "TWENTY_COMPOSE_CMD=docker compose -f docker-compose.yml" >> "$GITHUB_ENV"
          echo "TWENTY_TAG=$TAG" >> "$GITHUB_ENV"
          echo "Will pull Twenty image: twentycrm/twenty:$TAG"
        fi

    - name: Checkout full repo (build from source)
      if: inputs.twenty-ref != ''
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.twenty-repository }}
        ref: ${{ inputs.twenty-ref }}
        token: ${{ inputs.github-token }}
        path: .twenty-spawn

    - name: Checkout docker compose files only (pull from Docker Hub)
      if: inputs.twenty-ref == ''
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.twenty-repository }}
        ref: main
        token: ${{ inputs.github-token }}
        sparse-checkout: |
          packages/twenty-docker
        sparse-checkout-cone-mode: false
        path: .twenty-spawn

    - name: Prepare environment
      shell: bash
      working-directory: ./.twenty-spawn/packages/twenty-docker
      run: |
        cp .env.example .env
        echo "" >> .env
        echo "APP_SECRET=replace_me_with_a_random_string" >> .env
        echo "SERVER_URL=http://localhost:3000" >> .env

    - name: Set image tag for Docker Hub pull
      if: inputs.twenty-ref == ''
      shell: bash
      working-directory: ./.twenty-spawn/packages/twenty-docker
      run: echo "TAG=${{ env.TWENTY_TAG }}" >> .env

    - name: Start Twenty instance
      shell: bash
      working-directory: ./.twenty-spawn/packages/twenty-docker
      run: |
        $TWENTY_COMPOSE_CMD up -d || {
          echo "::error::Docker compose failed to start"
          $TWENTY_COMPOSE_CMD logs
          exit 1
        }
        $TWENTY_COMPOSE_CMD logs db server worker -f &

    - name: Wait for database to be healthy
      shell: bash
      working-directory: ./.twenty-spawn/packages/twenty-docker
      run: |
        echo "Waiting for database..."
        count=0
        while [ "$(docker inspect --format='{{.State.Health.Status}}' twenty-db-1 2>/dev/null)" != "healthy" ]; do
          sleep 2
          count=$((count + 2))

          status=$(docker inspect --format='{{.State.Status}}' twenty-db-1 2>/dev/null || echo "not found")
          if [ "$status" = "exited" ]; then
            echo "::error::Database container exited unexpectedly"
            $TWENTY_COMPOSE_CMD logs db
            exit 1
          fi

          if [ $count -gt 120 ]; then
            echo "::error::Database did not become healthy within 2 minutes"
            $TWENTY_COMPOSE_CMD logs db
            exit 1
          fi

          echo "Still waiting for database... (${count}s/120s)"
        done
        echo "Database is healthy!"

    - name: Wait for server to be healthy
      id: server-ready
      shell: bash
      working-directory: ./.twenty-spawn/packages/twenty-docker
      run: |
        echo "Waiting for server..."
        count=0
        while [ "$(docker inspect --format='{{.State.Health.Status}}' twenty-server-1 2>/dev/null)" != "healthy" ]; do
          sleep 3
          count=$((count + 3))

          status=$(docker inspect --format='{{.State.Status}}' twenty-server-1 2>/dev/null || echo "not found")
          if [ "$status" = "exited" ]; then
            echo "::error::Server container exited unexpectedly"
            $TWENTY_COMPOSE_CMD logs server
            exit 1
          fi

          if [ $count -gt 300 ]; then
            echo "::error::Server did not become healthy within 5 minutes"
            $TWENTY_COMPOSE_CMD logs server
            exit 1
          fi

          echo "Still waiting for server... (${count}s/300s)"
        done

        echo "Server is healthy!"
        echo "server-url=http://localhost:3000" >> "$GITHUB_OUTPUT"

    - name: Verify server is reachable
      shell: bash
      run: |
        curl -f http://localhost:3000/healthz || {
          echo "::error::Server health check failed after startup"
          exit 1
        }
        echo "Twenty instance is ready at http://localhost:3000"

    - name: Set admin access token
      id: admin-token
      shell: bash
      run: |
        ACCESS_TOKEN="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..HMGqCsVlOAPVUBhKSGlD1X86VoHKt4LIUtET3CGIdik"
        echo "::add-mask::$ACCESS_TOKEN"
        echo "access-token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"
