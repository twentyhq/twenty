# Root Railway config for the web service attached to crm.xopure.com.
# Railway currently deploys this repository from the root, so this file must
# point at the production Twenty server image under services/server.

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/server/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/healthz"
healthcheckTimeout = 300
