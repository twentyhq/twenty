worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_x_tenant_id" $request_time';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Rate limiting zones
    limit_req_zone $http_x_tenant_id zone=tenant_api:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $http_x_tenant_id zone=fiscal:10m rate=10r/s;

    # Upstream backends
    upstream twenty_api {
        server twenty-server:3000;
        keepalive 32;
    }

    upstream twenty_front {
        server twenty-front:3000;
    }

    upstream asterisk_ari {
        server asterisk:8088;
    }

    # ==================== MAIN SERVER ====================
    server {
        listen 80;
        server_name *.ccgcentral.com ccgcentral.com;

        # Redirect HTTP → HTTPS in production
        # return 301 https://$host$request_uri;

        # Wildcard tenant routing: tenant1.ccgcentral.com
        set $tenant_subdomain "";
        if ($host ~* ^([a-z0-9-]+)\.ccgcentral\.com$) {
            set $tenant_subdomain $1;
        }

        # Health check (no auth)
        location /healthz {
            proxy_pass http://twenty_api/healthz;
        }

        # ==================== API ROUTES ====================

        # Auth (rate limited)
        location /api/auth/ {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://twenty_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Tenant-Subdomain $tenant_subdomain;
        }

        # Core CRM API (all tenants)
        location /api/ {
            limit_req zone=tenant_api burst=50 nodelay;
            proxy_pass http://twenty_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Tenant-Subdomain $tenant_subdomain;

            # CORS headers
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Tenant-ID" always;
            add_header Access-Control-Allow-Credentials true always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # GraphQL
        location /graphql {
            limit_req zone=tenant_api burst=50 nodelay;
            proxy_pass http://twenty_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Tenant-Subdomain $tenant_subdomain;
        }

        # Metadata GraphQL
        location /metadata {
            proxy_pass http://twenty_api;
            proxy_set_header Host $host;
            proxy_set_header X-Tenant-Subdomain $tenant_subdomain;
        }

        # REST API
        location /rest/ {
            limit_req zone=tenant_api burst=30 nodelay;
            proxy_pass http://twenty_api;
            proxy_set_header Host $host;
            proxy_set_header X-Tenant-Subdomain $tenant_subdomain;
        }

        # ==================== ASTERISK/VoIP ROUTES ====================
        location /ari/ {
            limit_req zone=tenant_api burst=20 nodelay;
            proxy_pass http://asterisk_ari/ari/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket for ARI events
        location /ari/events {
            proxy_pass http://asterisk_ari/ari/events;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # ==================== FISCAL ROUTES (rate limited separately) ====================
        location /api/fiscal/ {
            limit_req zone=fiscal burst=5 nodelay;
            proxy_pass http://twenty_api;
            proxy_set_header Host $host;
            proxy_set_header X-Tenant-Subdomain $tenant_subdomain;
            proxy_read_timeout 60s;  # DIAN/SAT can be slow
        }

        # ==================== FRONTEND ====================
        location / {
            proxy_pass http://twenty_front;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket for frontend HMR / real-time
        location /ws {
            proxy_pass http://twenty_front;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ==================== SECURITY HEADERS ====================
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}
