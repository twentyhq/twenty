# Default image used by all components
image:
  repository: twentycrm/twenty
  tag: ""  # defaults to Chart.yaml appVersion
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

# Global security context (uid/gid for all pods)
securityContext:
  runAsUser: 1000
  fsGroup: 1000

# Storage backend: local or s3
storage:
  type: local
  s3:
    bucket: ""
    region: ""
    endpoint: ""
    # Option A: direct values
    accessKeyId: ""
    secretAccessKey: ""
    # Option B: reference a Secret
    # secretName: my-s3-creds
    # accessKeyIdKey: accessKeyId
    # secretAccessKeyKey: secretAccessKey

# Auth tokens (random if not provided)
secrets:
  tokens:
    create: true
    name: tokens
    accessToken: ""

# Server deployment
server:
  enabled: true
  replicaCount: 1
  image: {}  # override repository/tag/pullPolicy per component

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1024Mi

  # Set to "true" to skip database migrations on startup (useful for read-only replicas or manual migration control)
  disableDbMigrations: false

  env:
    SIGN_IN_PREFILLED: "false"
    ACCESS_TOKEN_EXPIRES_IN: "7d"
    LOGIN_TOKEN_EXPIRES_IN: "1h"
  additionalEnv: { }

  # Optional additional server environment variables
  # These map directly to Twenty server config. Uncomment and set as needed.
  # GOOGLE_AUTH
  # AUTH_GOOGLE_ENABLED: false
  # AUTH_GOOGLE_CLIENT_ID: ""
  # AUTH_GOOGLE_CLIENT_SECRET: ""
  # AUTH_GOOGLE_CALLBACK_URL: ""
  # AUTH_GOOGLE_APIS_CALLBACK_URL: ""
  # CALENDAR_PROVIDER_GOOGLE_ENABLED: false
  # MESSAGING_PROVIDER_GMAIL_ENABLED: false

  # MICROSOFT_AUTH
  # AUTH_MICROSOFT_ENABLED: false
  # AUTH_MICROSOFT_CLIENT_ID: ""
  # AUTH_MICROSOFT_CLIENT_SECRET: ""
  # AUTH_MICROSOFT_CALLBACK_URL: ""
  # AUTH_MICROSOFT_APIS_CALLBACK_URL: ""
  # CALENDAR_PROVIDER_MICROSOFT_ENABLED: false
  # MESSAGING_PROVIDER_MICROSOFT_ENABLED: false

  # EMAIL_SETTINGS
  # EMAIL_DRIVER: LOGGER
  # EMAIL_FROM_ADDRESS: noreply@yourdomain.com
  # EMAIL_FROM_NAME: Felix from Twenty
  # EMAIL_SMTP_HOST: ""
  # EMAIL_SMTP_PORT: 587
  # EMAIL_SMTP_USER: ""
  # EMAIL_SMTP_PASSWORD: ""
  # EMAIL_SMTP_NO_TLS: false
  # EMAIL_SYSTEM_ADDRESS: system@yourdomain.com

  # Extra envs for custom builds (rendered to server only)
  # Use name/value or name/valueFrom (e.g., secretKeyRef)
  extraEnv: []
  # extraEnv examples:
  # - name: FEATURE_X_ENABLED
  #   value: "true"
  # - name: CUSTOM_SECRET
  #   valueFrom:
  #     secretKeyRef:
  #       name: my-secret
  #       key: custom

  service:
    type: ClusterIP
    port: 3000

  ingress:
    enabled: true
    className: nginx
    acme: true  # add cert-manager annotation for Let's Encrypt
    annotations: {}
    hosts:
      - host: crm.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: twenty-tls
        hosts:
          - crm.example.com

  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    existingClaim: ""
    accessModes:
      - ReadWriteOnce

  dockerDataPersistence:
    enabled: true
    size: 100Mi
    storageClass: ""
    existingClaim: ""
    accessModes:
      - ReadWriteOnce

  extraVolumeMounts: []

# Worker deployment
worker:
  enabled: true
  replicaCount: 1
  image: {}
  command: ["yarn", "worker:prod"]

  resources:
    requests:
      cpu: 250m
      memory: 1024Mi
    limits:
      cpu: 1000m
      memory: 2048Mi

  additionalEnv: {}  # simple key-value map; use extraEnv for valueFrom support
  # Extra envs with valueFrom support (e.g., secretKeyRef, configMapKeyRef)
  extraEnv: []
  # extraEnv examples:
  # - name: FEATURE_X_ENABLED
  #   value: "true"
  # - name: CUSTOM_SECRET
  #   valueFrom:
  #     secretKeyRef:
  #       name: my-secret
  #       key: custom

# PostgreSQL
db:
  enabled: true
  internal:
    database: twenty
    appUser: twenty_app_user
    appPassword: ""  # random if empty
    image:
      repository: twentycrm/twenty-postgres-spilo
      tag: v0.43.5
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1024Mi
    persistence:
      enabled: true
      size: 10Gi
      storageClass: ""
      existingClaim: ""
      accessModes:
        - ReadWriteOnce
    env:
      PGUSER_SUPERUSER: postgres
      PGPASSWORD_SUPERUSER: postgres
      SPILO_PROVIDER: local
      ALLOW_NOSSL: "true"

  external:
    host: ""
    port: 5432
    user: twenty_app_user
    password: ""
    database: twenty
    ssl: false
    secretName: ""
    passwordKey: ""

# Redis
redisInternal:
  enabled: true
  image:
    repository: redis/redis-stack-server
    tag: 7.2.0-v10
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 250m
      memory: 1024Mi
    limits:
      cpu: 500m
      memory: 2048Mi
  service:
    port: 6379
  persistence:
    enabled: false
    size: 1Gi
    storageClass: ""
    existingClaim: ""
    accessModes:
      - ReadWriteOnce

# External Redis (when redisInternal.enabled=false)
redis:
  external:
    host: ""
    port: 6379
    password: ""
    secretName: ""
    passwordKey: ""
