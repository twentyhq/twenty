name: CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [labeled]

permissions:
  contents: read
  # Uncomment to let the publish-to-npm job below sign with provenance (OIDC).
  # id-token: write

env:
  TWENTY_DEPLOY_URL: http://localhost:2020

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-and-install:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'deploy')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Deploy
        uses: twentyhq/twenty/.github/actions/deploy-twenty-app@main
        with:
          api-url: ${{ env.TWENTY_DEPLOY_URL }}
          api-key: ${{ secrets.TWENTY_DEPLOY_API_KEY }}

      - name: Install
        uses: twentyhq/twenty/.github/actions/install-twenty-app@main
        with:
          api-url: ${{ env.TWENTY_DEPLOY_URL }}
          api-key: ${{ secrets.TWENTY_DEPLOY_API_KEY }}

  # Publish your app to npm so it can be listed on a Twenty marketplace.
  # Publishing with provenance certifies which GitHub repository built the
  # package, which is how you claim ownership of your app on the marketplace.
  #
  # To enable:
  #   1. Uncomment the publish-to-npm job below and the `id-token: write`
  #      permission near the top of this file.
  #   2. On npmjs.com open your package > Settings > Trusted Publisher and
  #      register this repository with the workflow `cd.yml`.
  #      See https://docs.npmjs.com/trusted-publishers
  #   3. Bump the version in package.json before merging to main; npm rejects
  #      republishing a version that already exists.
