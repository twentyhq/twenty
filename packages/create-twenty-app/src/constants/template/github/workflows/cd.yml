  #
  #     - name: Setup Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: 24
  #         registry-url: https://registry.npmjs.org
  #
  #     - name: Update npm
  #       # Trusted publishing requires npm 11.5.1 or later.
  #       run: npm install -g npm@latest
